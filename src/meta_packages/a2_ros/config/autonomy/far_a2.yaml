far_planner:
  ros__parameters:
    # Robot dimensions - tuned for A2 (SMB defaults: robot_dim=0.8, vehicle_height=0.75)
    robot_dim:      0.45   # A2 body diagonal ~0.45 m
    vehicle_height: 0.5    # A2 standing height ~0.5 m

    # Sensor
    sensor_range:   10.0   # lidar cutoff 10 m

    # Planning
    main_run_freq:  2.5
    is_static_env:  false
    is_pub_boundary: false

    # Contour detection
    voxel_dim: 0.2          # increase to 0.3 if contours are noisy

    # Goal
    converge_distance: 0.5

    # Dynamic obstacle decay
    dynamic_obs_decay_time: 2.0
