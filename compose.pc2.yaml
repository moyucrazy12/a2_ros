name: ${USER}_a2_ros_pc2

# PC2 (192.168.124.162) — standalone compose file, deployed directly on pc2.
# pc2 hosts the Zenoh router for the entire robot network; every robot node
# (including the NUC on .124) discovers through it. Bring up with:
#   docker compose -f compose.pc2.yaml up -d

x-common: &common
  init: true
  network_mode: host
  ipc: host
  privileged: true
  ulimits:
    rtprio: 99
    nice: -20
    memlock: -1
  environment:
    - DISPLAY=${DISPLAY:-:0}
    - XAUTHORITY=/home/ubuntu/.Xauthority
    - QT_X11_NO_MITSHM=1
    - COLCON_DEFAULTS_FILE=/a2_ros/environment/colcon/pc2.defaults.yaml
  working_dir: /a2_ros
  command: [ "bash" ]
  stdin_open: true
  tty: true

x-vol-x11: &vol-x11
  type: bind
  source: /tmp/.X11-unix
  target: /tmp/.X11-unix
x-vol-xauth: &vol-xauth
  type: bind
  source: ${XAUTHORITY:-${HOME}/.Xauthority}
  target: /home/ubuntu/.Xauthority
x-vol-workspace: &vol-workspace
  type: bind
  source: .
  target: /a2_ros
x-vol-bags: &vol-bags
  type: bind
  source: ${ROS_BAGS_DIR:-./bags}
  target: /a2_ros/bags

services:
  # Zenoh discovery router for the robot network. Must start before a2_ros_pc2
  # and before any nodes on the NUC — they all connect to this router via
  # ZENOH_ROUTER_IP_ROBOT in their .env. Binds tcp/0.0.0.0:7447 on the host
  # network. Run only ONE router per host.
  zenoh_router_robot:
    <<: *common
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: a2_base
      cache_from:
        - a2_ros:base
        - a2_ros:builder
      cache_to:
        - type=inline
    restart: unless-stopped
    command: [ "ros2", "run", "rmw_zenoh_cpp", "rmw_zenohd" ]

  a2_pc2_bridge:
    <<: *common
    image: a2_ros:robot
    restart: unless-stopped
    command: [ "bash", "/a2_ros/scripts/pc2/pc2_bridge.sh" ]
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: robot
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
        INPUT_GID: ${INPUT_GID:-107}
      cache_from:
        - a2_ros:robot
        - a2_ros:base
        - a2_ros:builder
      cache_to:
        - type=inline
    depends_on:
      - zenoh_router_robot
    shm_size: '512m'
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags
      - type: volume
        source: robot_bash_history
        target: /home/ubuntu/.bash_history_dir
      - type: volume
        source: robot_colcon_build
        target: /a2_ros/build
      - type: volume
        source: robot_colcon_install
        target: /a2_ros/install
      - type: volume
        source: robot_rosdep_cache
        target: /home/ubuntu/.ros

  a2_pc2_joy:
    <<: *common
    image: a2_ros:robot
    restart: unless-stopped
    command: [ "bash", "/a2_ros/scripts/pc2/pc2_joy.sh" ]
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: robot
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
        INPUT_GID: ${INPUT_GID:-107}
      cache_from:
        - a2_ros:robot
        - a2_ros:base
        - a2_ros:builder
      cache_to:
        - type=inline
    depends_on:
      - zenoh_router_robot
    shm_size: '512m'
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags
      - type: volume
        source: robot_bash_history
        target: /home/ubuntu/.bash_history_dir
      - type: volume
        source: robot_colcon_build
        target: /a2_ros/build
      - type: volume
        source: robot_colcon_install
        target: /a2_ros/install
      - type: volume
        source: robot_rosdep_cache
        target: /home/ubuntu/.ros

volumes:
  robot_bash_history:
  robot_colcon_build:
  robot_colcon_install:
  robot_rosdep_cache:
