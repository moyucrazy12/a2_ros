x-common: &common
  network_mode: host
  privileged: true
  # gpus: all
  environment:
    - DISPLAY=${DISPLAY}
    - QT_X11_NO_MITSHM=1
  working_dir: /a2_ros
  command: [ "bash" ]
  stdin_open: true
  tty: true

# Individual bind-mount anchors so services can compose their own volume lists
x-vol-x11: &vol-x11
  type: bind
  source: /tmp/.X11-unix
  target: /tmp/.X11-unix
x-vol-xauth: &vol-xauth
  type: bind
  source: ~/.Xauthority
  target: /home/ubuntu/.Xauthority
x-vol-workspace: &vol-workspace
  type: bind
  source: .
  target: /a2_ros
x-vol-bags: &vol-bags
  # ROS bags — bind mount so bags are accessible from the host.
  # Override ROS_BAGS_DIR in a .env file to point at your archive directory.
  type: bind
  source: ${ROS_BAGS_DIR:-./bags}
  target: /a2_ros/bags

services:
  a2_base:
    <<: *common
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: a2_base
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags

  a2_ros_dev:
    <<: *common
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: dev
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    devices:
      - /dev/input/js0:/dev/input/js0
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags
      - type: volume
        source: dev_bash_history
        target: /home/ubuntu/.bash_history_dir
      - type: volume
        source: dev_colcon_build
        target: /a2_ros/build
      - type: volume
        source: dev_colcon_install
        target: /a2_ros/install
      - type: volume
        source: dev_rosdep_cache
        target: /home/ubuntu/.ros

  a2_ros_robot:
    <<: *common
    build:
      context: .
      dockerfile: ./environment/Dockerfile.dev
      target: robot
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    # Intentionally left out until we start testing on the robot
    # devices:
    #   - /dev/input/js0:/dev/input/js0
    volumes:
      - *vol-x11
      - *vol-xauth
      - *vol-workspace
      - *vol-bags
      - type: volume
        source: robot_bash_history
        target: /home/ubuntu/.bash_history_dir
      - type: volume
        source: robot_colcon_build
        target: /a2_ros/build
      - type: volume
        source: robot_colcon_install
        target: /a2_ros/install
      - type: volume
        source: robot_rosdep_cache
        target: /home/ubuntu/.ros

volumes:
  dev_bash_history:
  dev_colcon_build:
  dev_colcon_install:
  dev_rosdep_cache:
  robot_bash_history:
  robot_colcon_build:
  robot_colcon_install:
  robot_rosdep_cache:
